# ===================== UPSTREAM SERVERS =====================
upstream backend {
    least_conn;
    server backend:8000 max_fails=3 fail_timeout=30s;
    keepalive 32;
}

upstream frontend {
    least_conn;
    server frontend:3000 max_fails=3 fail_timeout=30s;
    keepalive 32;
}

# ===================== RATE LIMITING =====================
limit_req_zone $binary_remote_addr zone=general_limit:10m rate=10r/s;
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=30r/s;
limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=5r/m;

# ===================== HTTP REDIRECT TO HTTPS =====================
server {
    listen 80;
    listen [::]:80;
    server_name _;

    # Health check endpoint (allow from anywhere)
    location /health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }

    # Redirect HTTP to HTTPS (except for health checks)
    location / {
        return 301 https://$host$request_uri;
    }
}

# ===================== HTTPS SERVER =====================
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name _;

    # ===================== SSL CONFIGURATION =====================
    ssl_certificate /etc/nginx/ssl/cert.pem;
    ssl_certificate_key /etc/nginx/ssl/key.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;
    ssl_session_tickets off;
    ssl_stapling on;
    ssl_stapling_verify on;

    # ===================== SECURITY HEADERS =====================
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=(), payment=()" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self' data:;" always;

    # ===================== GZIP COMPRESSION =====================
    gzip on;
    gzip_vary on;
    gzip_min_length 1000;
    gzip_types text/plain text/css text/xml text/javascript 
               application/x-javascript application/xml+rss 
               application/json application/javascript;
    gzip_comp_level 6;
    gzip_disable "msie6";

    # ===================== PROXY SETTINGS =====================
    proxy_http_version 1.1;
    proxy_set_header Connection "";
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host $host;
    proxy_set_header X-Forwarded-Port $server_port;
    
    # Timeouts
    proxy_connect_timeout 60s;
    proxy_send_timeout 60s;
    proxy_read_timeout 60s;
    
    # Buffering
    proxy_buffering on;
    proxy_buffer_size 4k;
    proxy_buffers 8 4k;
    proxy_busy_buffers_size 8k;

    # ===================== LOGGING =====================
    access_log /var/log/nginx/access.log combined buffer=32k flush=5s;
    error_log /var/log/nginx/error.log warn;

    # ===================== HEALTH CHECK =====================
    location /health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }

    # ===================== FRONTEND ROUTES =====================
    location / {
        limit_req zone=general_limit burst=20 nodelay;
        
        proxy_pass http://frontend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        
        # Cache control
        expires -1;
        add_header Cache-Control "public, max-age=0, must-revalidate";
    }

    # ===================== API ROUTES =====================
    location /api/ {
        limit_req zone=api_limit burst=50 nodelay;
        
        proxy_pass http://backend;
        
        # Cache control - no caching for API
        expires -1;
        add_header Cache-Control "no-store, no-cache, must-revalidate, max-age=0";
        add_header Pragma "no-cache";
    }

    # ===================== AUTHENTICATION ENDPOINTS (Strict rate limit) =====================
    location /api/auth/login/ {
        limit_req zone=auth_limit burst=5 nodelay;
        proxy_pass http://backend;
    }

    location /api/auth/token/refresh/ {
        limit_req zone=auth_limit burst=5 nodelay;
        proxy_pass http://backend;
    }

    location /api/auth/2fa/verify-login/ {
        limit_req zone=auth_limit burst=5 nodelay;
        proxy_pass http://backend;
    }

    # ===================== DJANGO ADMIN =====================
    location /admin/ {
        limit_req zone=general_limit burst=10 nodelay;
        proxy_pass http://backend;
        
        # Require HTTPS only
        add_header Strict-Transport-Security "max-age=31536000" always;
    }

    # ===================== STATIC FILES (Long cache) =====================
    location /static/ {
        alias /app/staticfiles/;
        
        expires 30d;
        add_header Cache-Control "public, max-age=2592000, immutable";
        add_header ETag "";
        
        access_log off;
    }

    # ===================== MEDIA FILES (Medium cache) =====================
    location /media/ {
        alias /app/media/;
        
        expires 7d;
        add_header Cache-Control "public, max-age=604800";
        
        access_log off;
    }

    # ===================== DENY ACCESS TO SENSITIVE PATHS =====================
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    location ~ ~$ {
        deny all;
        access_log off;
        log_not_found off;
    }

    location /wp-admin {
        deny all;
        access_log off;
        log_not_found off;
    }

    location /wp-login.php {
        deny all;
        access_log off;
        log_not_found off;
    }
}

